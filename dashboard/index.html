<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leader Screener</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">US Leader Screener</p>
      <h1>주도주 후보 대시보드</h1>
    </div>
    <div class="meta" id="meta">Loading...</div>
  </header>

  <main>
    <section class="market" id="market"></section>

    <section class="triple">
      <div>
        <div class="section-title">
          <h2>매수 가능 후보</h2>
          <span id="buyable-count">0</span>
        </div>
        <div class="cards" id="buyable"></div>
      </div>
      <div>
        <div class="section-title">
          <h2>매수 검토</h2>
          <span id="review-count">0</span>
        </div>
        <div class="cards" id="review"></div>
      </div>
      <div>
        <div class="section-title">
          <h2>강한 감시</h2>
          <span id="strong-watch-count">0</span>
        </div>
        <div class="cards" id="strong-watch"></div>
      </div>
    </section>

    <section>
      <div class="section-title">
        <h2>전체 순위표</h2>
        <input id="filter" type="search" placeholder="티커, 섹터, 태그 검색">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>순위</th>
              <th>티커</th>
              <th>상태</th>
              <th>총점</th>
              <th>상대</th>
              <th>모멘텀</th>
              <th>섹터</th>
              <th>수급</th>
              <th>셋업</th>
              <th>이유/경고</th>
            </tr>
          </thead>
          <tbody id="ranking"></tbody>
        </table>
      </div>
    </section>

    <section class="backtest-section">
      <div class="section-title">
        <h2>월간 선정력 검증</h2>
        <span id="monthly-meta">Loading...</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Top N</th>
              <th>기간</th>
              <th>평균</th>
              <th>중앙값</th>
              <th>플러스</th>
              <th>SPY 초과</th>
              <th>QQQ 초과</th>
              <th>평균 SPY 초과</th>
              <th>평균 QQQ 초과</th>
            </tr>
          </thead>
          <tbody id="monthly-summary"></tbody>
        </table>
      </div>
      <div class="split-lower">
        <div>
          <div class="section-title compact">
            <h2>최악 구간</h2>
          </div>
          <div class="cards" id="monthly-worst"></div>
        </div>
        <div>
          <div class="section-title compact">
            <h2>자주 선정된 종목</h2>
          </div>
          <div class="cards" id="monthly-contributors"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
