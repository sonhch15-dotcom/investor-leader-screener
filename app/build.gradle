plugins {
    id 'com.android.application'
}

android {
    namespace 'com.sweethome.investor'
    compileSdk 36

    defaultConfig {
        applicationId 'com.sweethome.investor'
        minSdk 26
        targetSdk 36
        versionCode 55
        versionName '0.3.43'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}
