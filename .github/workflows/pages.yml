name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Low-frequency market checkpoints for the personal Android app.
    # 00:30 UTC: Korea market open window / 09:30 KST.
    - cron: "30 0 * * 1-5"
    # 06:40 UTC: Korea market close window / 15:40 KST.
    - cron: "40 6 * * 1-5"
    # 14:30 UTC: US market open window during US daylight time / 23:30 KST.
    - cron: "30 14 * * 1-5"
    # 22:00 UTC: after US regular session close / 07:00 KST next day.
    - cron: "0 22 * * 1-5"
    # 23:30 UTC: delayed Yahoo close-price retry / 08:30 KST next day.
    - cron: "30 23 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Refresh screener data
        run: node src/refresh.mjs

      - name: Build strategy dashboard data
        run: node src/strategy-dashboard-data.mjs

      - name: Build Korea strategy data
        run: node src/korea-strategy-test.mjs --years 5

      - name: Validate early exit and re-entry research
        run: node src/early-exit-reentry-test.mjs

      - name: Build US strategy history report
        run: node src/us-strategy-history-report.mjs

      - name: Verify US strategy history report
        run: node scripts/verify-us-strategy-history-report.mjs

      - name: Build static site
        run: node scripts/build-pages.mjs

      - name: Build Android signal API
        run: node scripts/build-signal-package.mjs

      - name: Verify Android signal API contract
        run: |
          node src/live-score-c-signal.test.mjs
          node src/strategy-transition-contract.test.mjs
          node scripts/verify-signal-package.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
