name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Weekly refresh after the US market week has fully closed.
    # Runs Monday 07:00 KST / Sunday 22:00 UTC.
    - cron: "0 22 * * 0"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Refresh screener data
        run: node src/refresh.mjs

      - name: Build strategy dashboard data
        run: node src/strategy-dashboard-data.mjs

      - name: Build Korea strategy data
        run: node src/korea-strategy-test.mjs --years 5

      - name: Build static site
        run: node scripts/build-pages.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
